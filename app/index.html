<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6366F1" />
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; base-uri 'self'; form-action 'self'" />
    <!-- Security Headers via meta (best-effort, should also be set at Cloudflare-level) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <title>资源云 - 全网资源交流分享</title>
    <meta name="description" content="全网资源交流分享，高效管理和分享您的资源链接。支持百度网盘、夸克网盘、阿里云盘、蓝奏云、迅雷云盘等多种网盘资源聚合。" />
    <meta name="keywords" content="网盘资源,资源聚合,百度网盘,夸克网盘,阿里云盘,蓝奏云,迅雷云盘,资源分享,资源管理" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://pan110.pages.dev" />
    <!-- 注意: 更换域名时请更新以下 canonical 和 og:url -->
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pan110.pages.dev" />
    <meta property="og:title" content="资源云 - 全网资源交流分享" />
    <meta property="og:description" content="全网资源交流分享，高效管理和分享您的资源链接" />
    <meta property="og:site_name" content="资源云" />
    <meta property="og:locale" content="zh_CN" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="资源云 - 全网资源交流分享" />
    <meta name="twitter:description" content="全网资源交流分享，高效管理和分享您的资源链接" />
    <!-- 内联预加载 CSS：消除额外 HTTP 请求，FFP 更快，支持暗黑模式 -->
    <link rel="stylesheet" href="/preloader.css" />
  </head>
  <body>
    <!-- 预加载动画：JS 下载期间显示，消除白屏 -->
    <div id="preloader"><div class="spinner"></div></div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- API 预热：提前唤醒 Cloudflare Worker，减少冷启动延迟 -->
    <script>
      (function() {
        try {
          var conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
          if (conn && (conn.saveData || ['slow-2g','2g','3g'].indexOf(conn.effectiveType) !== -1)) return;
          // 只预热 health 端点，触发 Worker 冷启动但不过载
          // 数据请求由 React 渲染后统一通过 store 发起，避免重复
          fetch('/api/health', { method: 'GET', cache: 'no-store' }).catch(function(){});
        } catch(e) {}
      })();
    </script>
    <!-- JS 加载后隐藏预加载器 -->
    <script>
      // React 渲染完成后，root 中会有内容，自动移除 preloader
      new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          var p = document.getElementById('preloader');
          if (p) { p.classList.add('done'); setTimeout(function(){ p.remove(); }, 300); }
          this.disconnect();
        }
      }).observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
  </body>
</html>
