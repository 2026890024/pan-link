<!DOCTYPE html>
<html>
<head><title>Supabase 连通性测试</title>
<meta charset="UTF-8">
<style>
body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
.test-item { padding: 15px; margin: 10px 0; border-radius: 8px; background: #f5f5f5; }
.pass { border-left: 4px solid #22c55e; color: #166534; }
.fail { border-left: 4px solid #ef4444; color: #991b1b; }
.pending { border-left: 4px solid #eab308; color: #854d0e; }
pre { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 13px; }
button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; margin: 10px 0; }
button:hover { background: #2563eb; }
</style>
</head>
<body>
<h1>🔍 Supabase 连通性测试</h1>
<button onclick="runAllTests()">▶ 开始测试</button>
<div id="results"></div>

<script>
const SUPABASE_URL = 'https://kcucxrunwzcxxwxwnpojoc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_o8_FJLC1PLUpDs1Usdc_zA_6jSQafD-';

function log(id, status, title, detail) {
  const el = document.getElementById(id);
  if (!el) {
    const div = document.createElement('div');
    div.id = id;
    div.className = `test-item ${status}`;
    div.innerHTML = `<strong>${title}</strong><br><pre>${detail}</pre>`;
    document.getElementById('results').appendChild(div);
  } else {
    el.className = `test-item ${status}`;
    el.innerHTML = `<strong>${title}</strong><br><pre>${detail}</pre>`;
  }
}

async function runAllTests() {
  document.getElementById('results').innerHTML = '';
  
  // Test 1: 基本连通性（fetch REST API）
  log('t1', 'pending', '⏳ 测试1: 基本网络连通性...', '正在请求...');
  
  try {
    const start = Date.now();
    const resp = await fetch(`${SUPABASE_URL}/rest/v1/`, {
      headers: { 'apikey': SUPABASE_KEY }
    });
    const elapsed = Date.now() - start;
    if (resp.ok) {
      log('t1', 'pass', '✅ 测试1: 网络连通', `状态码: ${resp.status}\n耗时: ${elapsed}ms\n说明: 可以连接到 Supabase 服务器`);
    } else {
      log('t1', 'fail', '❌ 测试1: 网络异常', `状态码: ${resp.status}\n耗时: ${elapsed}ms\n响应: ${await resp.text()}`);
    }
  } catch (err) {
    log('t1', 'fail', '❌ 测试1: 完全无法连接', `错误类型: ${err.name}\n错误信息: ${err.message}\n\n⚠️ 这通常意味着:\n1. Supabase 被防火墙/网络屏蔽\n2. DNS 解析失败\n3. 网络不通`);
  }

  // Test 2: 尝试查询 links 表
  log('t2', 'pending', '⏳ 测试2: 查询 links 表 (需要CORS)...', '正在请求...');
  
  try {
    const start = Date.now();
    const resp = await fetch(`${SUPABASE_URL}/rest/v1/links?limit=1`, {
      headers: { 
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    const elapsed = Date.now() - start;
    const data = await resp.text();
    if (resp.ok) {
      log('t2', 'pass', '✅ 测试2: API 查询成功', `状态码: ${resp.status}\n耗时: ${elapsed}ms\n数据: ${data.substring(0, 200)}`);
    } else {
      log('t2', 'fail', '❌ 测试2: API 查询失败', `状态码: ${resp.status}\n耗时: ${elapsed}ms\n响应: ${data.substring(0, 300)}\n\n⚠️ 如果状态码=0 或 Failed to fetch → CORS或网络问题`);
    }
  } catch (err) {
    log('t2', 'fail', '❌ 测试2: 请求完全失败', `错误类型: ${err.name}\n错误信息: ${err.message}\n\n这是你页面上看到的那个 "Failed to fetch" 错误！`);
  }

  // Test 3: POST 插入测试（模拟 addLink）
  log('t3', 'pending', '⏳ 测试3: 写入测试 (POST)...', '正在请求...');
  
  try {
    const start = Date.now();
    const resp = await fetch(`${SUPABASE_URL}/rest/v1/links`, {
      method: 'POST',
      headers: { 
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        name: '__connectivity_test__',
        slug: 'test-' + Date.now(),
        url: 'https://test.com',
        user_id: '00000000-0000-0000-0000-000000000000'
      })
    });
    const elapsed = Date.now() - start;
    const data = await resp.text();
    if (resp.ok || resp.status === 201) {
      log('t3', 'pass', '✅ 测试3: 写入成功！', `状态码: ${resp.status}\n耗时: ${elapsed}ms\n✨ 云同步应该可以工作了！`);
    } else {
      log('t3', 'fail', '❌ 测试3: 写入失败', `状态码: ${resp.status}\n耗时: ${elapsed}ms\n响应: ${data.substring(0, 500)}`);
    }
  } catch (err) {
    log('t3', 'fail', '❌ 测试3: 写入请求完全失败', `错误类型: ${err.name}\n错误信息: ${err.message}`);
  }

  // 总结
  setTimeout(() => {
    const summary = document.createElement('div');
    summary.className = 'test-item';
    summary.style.background = '#fef3c7';
    summary.style.borderLeft = '4px solid #f59e0b';
    summary.innerHTML = `<strong>📋 总结</strong><pre>如果测试1通过但测试2/3失败 → 问题可能是 CORS 或 RLS
如果全部失败 → 网络层面无法访问 Supabase（被墙？）
如果全部通过 → 页面代码有其他问题</pre>`;
    document.getElementById('results').appendChild(summary);
  }, 500);
}
</script>
</body>
</html>
